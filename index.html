<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surpresa para Du</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:#0b6623;
color:white;
overflow:hidden;
}

/* tela inicial */

.tela{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:32px;
margin-bottom:30px;
}

button{
padding:20px 40px;
font-size:22px;
border:none;
border-radius:12px;
background:white;
color:#0b6623;
cursor:pointer;
}

/* mensagem */

.mensagem{
position:absolute;
z-index:2;
font-size:28px;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:14px;
max-width:80%;
}

/* slideshow */

.slides{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-1;
}

.slide{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
object-position:center;
opacity:0;
animation:slideshow 25s infinite;
}

/* delay das fotos */

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}
.slide:nth-child(5){animation-delay:20s;}

/* transição suave */

@keyframes slideshow{

0%{opacity:0;}

8%{opacity:1;}

20%{opacity:1;}

28%{opacity:0;}

100%{opacity:0;}

}

/* confete */

.confete{
position:fixed;
top:-20px;
width:12px;
height:12px;
border-radius:50%;
animation:cair linear infinite;
}

@keyframes cair{

0%{
transform:translateY(0) rotate(0deg);
}

100%{
transform:translateY(100vh) rotate(720deg);
}

}

</style>

</head>

<body>

<!-- TELA INICIAL -->

<div class="tela" id="inicio">

<h1>Clique para ver a surpresa 💚</h1>

<button onclick="abrir()">Abrir surpresa</button>

</div>

<!-- SURPRESA -->

<div id="surpresa" style="display:none;">

<div class="mensagem">

Você merece o melhor do mundo 💚  
<br><br>
Estou sempre aqui por você!  
<br><br>
Te amo,<br>
Du

</div>

<div class="slides">

<img src="81a63d6c-852c-411c-a1fa-075529165982.jpg" class="slide">

<img src="WhatsApp Image 2026-03-09 at 11.20.33.jpeg" class="slide">

<img src="abel ferreiras.avif" class="slide">

<img src="palmeiras.jpeg" class="slide">

<img src="violetta.jpeg" class="slide">

</div>

</div>

<script>

function abrir(){

document.getElementById("inicio").style.display="none";

document.getElementById("surpresa").style.display="block";

/* criar confete */

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confete";

c.style.left=Math.random()*100+"vw";

c.style.backgroundColor=["#ff0000","#ffd700","#00ff88","#00aaff","#ff66cc"][Math.floor(Math.random()*5)];

c.style.animationDuration=(Math.random()*3+3)+"s";

c.style.opacity=Math.random();

document.body.appendChild(c);

}

}

</script>

</body>

</html>
