<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mensagem para Du</title>

<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(45deg,#ff9a9e,#fbc2eb,#a1c4fd,#c2ffd8);
padding:50px;
}

h1{
font-size:40px;
color:#0a5c2a;
}

.mensagem{
font-size:28px;
margin:30px;
}

img{
width:120px;
margin:10px;
}

button{
padding:15px 30px;
font-size:20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#surpresa{
display:none;
margin-top:30px;
}

</style>

</head>

<body>

<h1>🌈 Clique para ver a surpresa 🌈</h1>

<button onclick="mostrar()">Abrir mensagem</button>

<div id="surpresa">

<div class="mensagem">
Você merece o melhor do mundo,<br>
estou sempre aqui por você! 💚<br><br>
Te amo,<br>
Du
</div>

<!-- imagens -->

<div class="slides">

<img src="81a63d6c-852c-411c-a1fa-075529165982.jpg" class="slide">

<img src="WhatsApp Image 2026-03-09 at 11.20.33.jpeg" class="slide">

<img src="abel ferreiras.avif" class="slide">

<img src="palmeiras.jpeg" class="slide">

<img src="violetta.jpeg" class="slide">

</div>

<script>

function mostrar(){
document.getElementById("surpresa").style.display="block";
}

</script>

</body>
</html>
