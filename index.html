<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surpresa para Du 💚</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
overflow:hidden;
background:#0b6623;
}

/* luz verde animada */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:radial-gradient(circle,#1f8f4d 0%,transparent 60%);
animation:luz 10s linear infinite;
opacity:0.4;
z-index:-2;
}

@keyframes luz{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* tela inicial */

.tela{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

button{
padding:20px 40px;
font-size:24px;
border:none;
border-radius:12px;
background:white;
color:#0b6623;
cursor:pointer;
}

/* mensagem */

.mensagem{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:3;
font-size:30px;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:14px;
max-width:80%;
text-align:center;
}

/* slideshow */

.slides{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-1;
}

.slide{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
object-position:center;
opacity:0;
animation:slideshow 25s infinite;
}

/* efeito cinematic */

.slide img{
animation:zoom 25s infinite;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

/* delay */

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}
.slide:nth-child(5){animation-delay:20s;}

@keyframes slideshow{

0%{opacity:0;}

8%{opacity:1;}

20%{opacity:1;}

28%{opacity:0;}

100%{opacity:0;}

}

/* confete */

.confete{
position:fixed;
top:-40px;
width:30px;
height:30px;
background-size:contain;
background-repeat:no-repeat;
animation:cair linear infinite;
}

@keyframes cair{

0%{
transform:translateY(0) rotate(0deg);
}

100%{
transform:translateY(100vh) rotate(720deg);
}

}

</style>

</head>

<body>

<div class="tela" id="inicio">

<h1>Clique para ver a surpresa 💚</h1>

<button onclick="abrir()">Abrir surpresa</button>

</div>

<div id="surpresa" style="display:none;">

<div class="mensagem">

Você merece o melhor do mundo 💚  
<br><br>
Estou sempre aqui por você!  
<br><br>
Te amo,<br>
Du

</div>

<div class="slides">

<img src="81a63d6c-852c-411c-a1fa-075529165982.jpg" class="slide">

<img src="WhatsApp Image 2026-03-09 at 11.20.33.jpeg" class="slide">

<img src="abel ferreiras.avif" class="slide">

<img src="palmeiras.jpeg" class="slide">

<img src="violetta.jpeg" class="slide">

</div>

</div>

<script>

function abrir(){

document.getElementById("inicio").style.display="none";
document.getElementById("surpresa").style.display="block";

/* confete com escudo */

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confete";

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(Math.random()*3+3)+"s";

c.style.backgroundImage="url('palmeiras.jpeg')";

document.body.appendChild(c);

}

}

</script>

</body>

</html>
